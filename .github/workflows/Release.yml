name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build Release Artifact
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Build release app
        run: |
          xcodebuild \
            -project Whisky.xcodeproj \
            -scheme Whisky \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath Build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Archive unsigned app bundle
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            Build/Build/Products/Release/WhiskyGPTK.app \
            WhiskyGPTK-${{ github.ref_name }}-unsigned.zip

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Whisky GPTK ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: WhiskyGPTK-${{ github.ref_name }}-unsigned.zip
