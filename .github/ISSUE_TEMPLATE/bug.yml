name: Bug Report
description: Report a reproducible problem in Whisky GPTK.
title: '[Bug]: '
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the problem clearly and concisely.
      placeholder: The bottle opens, but the app crashes before the launcher appears.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: Whisky GPTK version
      description: Include the app version shown in the bundle or release.
      placeholder: 3.2.0
    validations:
      required: true
  - type: input
    id: runtime-version
    attributes:
      label: Runtime version
      description: Include the installed GPTK/Wine runtime version if known.
      placeholder: 3.0.3
  - type: input
    id: macos-version
    attributes:
      label: macOS version
      description: Include the full macOS version.
      placeholder: 26.0 beta / 15.6 / 14.7
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant logs. In the app, use Command-L to open the logs folder.
      render: text
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues before filing this report.
          required: true
        - label: I removed personal information from the logs I shared.
          required: true
